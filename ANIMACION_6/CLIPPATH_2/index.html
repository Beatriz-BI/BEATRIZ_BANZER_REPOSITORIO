<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOT</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 700px;
            background-color: rgb(124, 226, 242);
            background-image:url(img/giphy-espaci_estrellas.gif);
            background-size: cover;
            position: relative;
            margin: 0 auto;
            overflow: hidden;

        }

        .contenedor_a{
            width: 200px;
            height: 400px;
            position: absolute; /* obligatorio para mover el div */
            top:80px;
            left:0px;
            animation: contenedor_a 4s infinite alternate linear;


        }

            @keyframes contenedor_a{
                0%{
                    top:80px
                }
                50%{
                    top:100px;
                    /*left:-300px;*/
                }
                60%{
                    top:110px;

                }
                80%{
                    top:100px;
                }
                100%{
                    top:85px;
                }
            }



        .cabeza{
            width: 140px;
            height: 170px;
            background-color:white;
            background-image: url();
            background-size: cover;
            clip-path: ellipse(50% 28% at 50% 50%); 
            position: absolute;
            left: 130px;
            top: 140px;
            z-index: 10;        /* Asegura que esté por encima de la otra imagen */
        }



        .orejas{
            width: 160px;
            height: 120px;
            background-color:gray;
            position:absolute;
            clip-path: ellipse(49% 11% at 50% 50%);
            left: 120px;
            top: 170px;
            z-index: 9;        /* Asegura que esté por encima de la otra imagen */
        
        }
               
        .ojoD{
            width: 18px;
            height: 18px;
            background-color:black;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            left: 170px;
            top: 210px;
            z-index: 15;  
            animation: ojoD 1s infinite forwards ;
        }

        @keyframes ojoD{
            from{
                background-color: red;
              
            }
            to{
               
                background-color: blue;

            }
        }


        .ojoI{
            width: 18px;
            height: 18px;
            background-color:black;
            clip-path: circle(50% at 50% 50%);
            position: absolute;
            left: 210px;
            top: 210px;
            z-index: 15;  
            animation: ojoI 1s infinite forwards ;
        }

        @keyframes ojoI{
       
            from{
                background-color: red;
                
            }
            to{
               
                background-color: blue;

            }
        
        }




        .boca{
            width: 30px;
            height: 25px;
            background-color:gray;
           clip-path: polygon(0 59%, 100% 60%, 82% 100%, 20% 100%);
            position: absolute;
            left: 185px;
            top: 220px;
            z-index: 15;  
        }

        .rostro{
            width: 120px;
            height: 120px;
            background-color:black;
            clip-path: ellipse(50% 28% at 50% 50%); 
            position: absolute;
            left: 140px;
            top: 170px;
            z-index: 11;
            /*z-index:-1; /* imagen esta detrás*/
        }
        .cuello{
            width: 140px;
            height: 120px;
            background-color:gray;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            position: absolute;
            left: 130px;
            top: 220px;
            z-index: 8;
            /*z-index:-1; /* imagen esta detrás*/
        }


        .cuerpo{
            width: 130px;
            height: 200px;
            background-color: white;
            background-size: cover;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            position: absolute;
            left: 135px;
            top:275px;
            z-index: 12;
            
        }

        .brazoD{
            width: 65px;
            height: 160px;
            background-color:white;
            clip-path: polygon(27% 100%, 57% 0, 100% 14%);
            position: absolute;
            left: 100px;
            top: 250px;
            z-index: 12;

        }

        .brazoI{
            width: 65px;
            height: 160px;
            background-color:white;
          clip-path: polygon(75% 100%, 0 17%, 46% 0);
            position: absolute;
            left: 235px;
            top: 247px;
            z-index: 12;

        }


            #cuadrito{
                width: 50px;
                height: 50px;
                /*background-color: black;*/
                position: absolute; /* obligatorio para mover el div */
                bottom: 600px;
                left: 650px;
                animation: cuadrito 10s infinite linear;

               /* z-index:13;*/

            }

            #cuadrito img{
                width: 100px;
                height: 100px;


            }

            @keyframes cuadrito{
                from{
                    left:450px;
                }
                to{
                    left:-100px;
                }
            }


            .luz{
            width: 100px;
            height: 100px;
            background-color:white;
            clip-path: ellipse(49% 11% at 50% 50%);
            position: absolute;
            left: 150px;
            top: 450px;
            z-index: 15;  
            animation: luz 3s infinite forwards  ;
        }

        @keyframes luz{
       
            from{
                background-color: rgb(187, 155, 48);
                
            }
            to{
               
                background-color: rgb(30, 5, 100);

            }
        
        }


    </style>
</head>
<body>
<a href="../../tareas.html">VOLVER</a>
<div class="contenedor">
    <div class="contenedor_a">
    <div class="cabeza"></div>
    <div class="orejas"></div>
    <div class="ojoD"></div>
    <div class="ojoI"></div>
    <div class="boca"></div>
    <div class="rostro"></div>
    <div class="cuello"></div>
    <div class="cuerpo"></div>
    <div class="brazoD"></div>
    <div class="brazoI"></div>
    <div class="luz"></div>
    </div>

    <div id="cuadrito">
        <img src="./img/wallie.png" alt="">
    </div>


</div>
</body>
</html>
