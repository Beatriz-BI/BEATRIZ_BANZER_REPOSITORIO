    <style>

            padding: 0px;

        .contenedor{
            width: 400px;
            height: 700px;
            background-color: rgb(124, 226, 242);
            background-image:url(IMG/c742883e33b6a56efcc7c9fd0a6ffa4c.gif );
            background-size: cover;
            position: relative;
            margin: 0 auto;
            overflow: hidden;

        .gorrito{
            width: 100px;
            height: 100px;
            background-color:yellow;
            background-image: url(IMG/morado_blanco.png);
            background-size: cover;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            left: 150px;
            top: 100px;
            z-index: 10;        /* Asegura que esté por encima de la otra imagen */
        }

        .star{
            width: 30px;
            height: 30px;
            background-color:blue;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            position: absolute;
            left: 185px;
            top: 90px;

        }

            top: 185px;

            left: 170px;
            top: 210px;
            z-index: 10;
