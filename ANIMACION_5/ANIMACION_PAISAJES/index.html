<html>
<head>
<title>TURISMO PERÚ</title>
<style>
*{
    padding:0px;
    margin:0px;
}
.contenedor{
    width: 800px;
    height:300px;
    border:1px solid black;
    margin:0 auto;
    position: relative;
    overflow: hidden;
}
.letrero{
    width: 100%;
    position:absolute;
    bottom:15px;
    text-align: center;
    font-size: 20px;
    font-family: "Times New Roman";
    color: rgb(28, 28, 28);
    background: rgba(250,250,250,0.5);
    padding: 10;
}
.tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4{
    width:200px;
    height:300px;
    position: absolute;
    top: -300;
}
.tarjeta1{
    background-image: url(img/mar_9_16.jpg);
    background-size: cover;
    left:0px;
    animation: tarjeta1 3s forwards;
}
.tarjeta2{
    background-image: url(img/costa_9_16.jpg);
    /*background-color: green;*/
    background-size: cover;
    left:200px;
    animation: tarjeta1 3s forwards 3s;
}
.tarjeta3{
    background-image: url(img/sierra_16.jpg);
    /*background-color:yellow;*/
    background-size: cover;
    left:400px;
    animation: tarjeta1 3s forwards 6s;
}
.tarjeta4{
    background-image: url(img/selva_9_16.jpg);
    /*background-color:blue;*/
    background-size: cover;
    left:600px;
    animation: tarjeta1 3s forwards 9s;
}

/*LAS RICAS ANIMACIONES*/
@keyframes tarjeta1{
    0%{
        top:-300px;
        transform: rotatey(180deg);
    }
    50%{
        top:300px;
    }
    100%{
        top:0px;
    }
}

.tarjeta1:hover{
    transition: 1s;
    transform: scale(1.2);
    z-index: 1;
}

.tarjeta2:hover{
    transition: 1s;
    transform: scale(1.2);
    z-index: 1;
}

.tarjeta3:hover{
    transition: 1s;
    transform: scale(1.2);
    z-index: 1;
}

.tarjeta4:hover{
    transition: 1s;
    transform: scale(1.2);
    z-index: 1;
}
.letrero:hover{
    transition: 1s;
    transform: scale(1.2);
    z-index: 1;
}

</style>
</head>
<body>
<a href="../../proyectos.html">VOLVER</a>
<div class="contenedor">
    <div class="tarjeta1" style="height: 300px; width: 200px;"></div>
    <div class="tarjeta2"></div>
    <div class="tarjeta3"></div>
    <div class="tarjeta4"></div>
    <div class="letrero">
        <h1>LUGARES TURÍSTICOS</h1>
    </div>
</body>
</html>
